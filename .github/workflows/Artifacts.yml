name: ARM64 Version From Official Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g., v1.0.0)'
        required: true
        default: 'latest'

env:
  IMAGE_NAME: openclaw
  TARGET_PLATFORM: 'linux/arm64'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.TARGET_PLATFORM }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
          push: false
          outputs: type=docker,dest=/tmp/OpenClaw_ARM64_${{ github.event.inputs.image_tag }}.tar
          no-cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            UPSTREAM_VERSION=${{ github.event.inputs.image_tag }}

      - name: Save image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw_ARM64_${{ github.event.inputs.image_tag }}
          path: /tmp/OpenClaw_ARM64_${{ github.event.inputs.image_tag }}.tar
          retention-days: 30

      - name: Verify image structure
        run: |
          docker load -i /tmp/OpenClaw_ARM64_${{ github.event.inputs.image_tag }}.tar
          IMG=${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
          echo "=== Verify factory backup file ==="
          docker run --rm --entrypoint="" $IMG ls -lh /openclaw-app.tar.xz
          echo "=== Verify /app directory is empty (awaiting runtime extraction) ==="
          docker run --rm --entrypoint="" $IMG ls -la /app/
          echo "=== Verify /app is owned by node:node ==="
          docker run --rm --entrypoint="" $IMG stat -c '%U:%G %a' /app
          echo "=== Verify symlink /usr/local/bin/openclaw ==="
          docker run --rm --entrypoint="" $IMG ls -la /usr/local/bin/openclaw
          echo "=== Verify entrypoint.sh ==="
          docker run --rm --entrypoint="" $IMG cat /entrypoint.sh
          echo "=== Verify corepack/pnpm ==="
          docker run --rm --entrypoint="" $IMG pnpm --version
          echo "=== Verify image size ==="
          docker images $IMG --format "Size: {{.Size}}"

      - name: Display image info
        run: |
          echo "Image build completed!"
          echo "Image name: ${{ env.IMAGE_NAME }}"
          echo "Image tag: ${{ github.event.inputs.image_tag }}"
          echo "Target platform: ${{ env.TARGET_PLATFORM }}"
          echo "Architecture: App Core Externalization (Rootless + Volume mounting)"
          echo "Image saved as workflow artifact, available for download in Artifacts"
